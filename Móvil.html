<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>🎮 GameVault · Inventario móvil</title>
  <!-- Google Font & Font Awesome 6 (free icons) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0b0f1c;
      font-family: 'Inter', sans-serif;
      color: #eef2ff;
      padding: 1rem 1rem 2rem 1rem;
    }

    /* contenedor principal */
    .inventory-wrapper {
      max-width: 1400px;
      margin: 0 auto;
    }

    /* header estilo gaming */
    .game-header {
      text-align: center;
      margin-bottom: 1.8rem;
    }

    .game-header h1 {
      font-size: 1.9rem;
      font-weight: 700;
      background: linear-gradient(135deg, #d9e2ff, #a855f7);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .game-header h1 i {
      background: none;
      -webkit-background-clip: unset;
      background-clip: unset;
      color: #c084fc;
      font-size: 1.8rem;
    }

    .sub {
      font-size: 0.85rem;
      color: #8a9bb5;
      margin-top: 6px;
      letter-spacing: 0.2px;
    }

    /* barra de búsqueda */
    .search-section {
      margin-bottom: 1.8rem;
      position: relative;
    }

    .search-box {
      display: flex;
      align-items: center;
      background: #1e293b;
      border-radius: 60px;
      padding: 0.7rem 1.2rem;
      border: 1px solid #334155;
      transition: all 0.2s ease;
      backdrop-filter: blur(2px);
    }

    .search-box i {
      color: #94a3b8;
      font-size: 1.1rem;
      margin-right: 10px;
    }

    .search-box input {
      background: transparent;
      border: none;
      outline: none;
      color: #f1f5f9;
      font-size: 1rem;
      width: 100%;
      font-weight: 500;
    }

    .search-box input::placeholder {
      color: #64748b;
      font-weight: 400;
    }

    .search-box:focus-within {
      border-color: #a855f7;
      box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.2);
    }

    /* contador de resultados */
    .stats {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 1rem;
      padding: 0 0.2rem;
      font-size: 0.8rem;
      color: #9ca3af;
    }

    .badge-count {
      background: #1e293b;
      padding: 0.2rem 0.7rem;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.75rem;
      color: #c084fc;
    }

    /* 🌟 GRID PRINCIPAL - diseño mobile first (2 columnas) */
    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
      gap: 1rem;
    }

    /* tarjeta individual */
    .game-card {
      background: #111827;
      border-radius: 24px;
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.2s;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
      border: 1px solid #2d3a4e;
      backdrop-filter: blur(2px);
    }

    .game-card:active {
      transform: scale(0.98);
    }

    /* área tipo "carátula" (game cover) */
    .game-cover {
      background: linear-gradient(145deg, #1f2a3e, #0f1622);
      aspect-ratio: 1 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      border-bottom: 2px solid #2d3e5f;
    }

    .cover-icon {
      font-size: 3.5rem;
      color: #a855f7;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4));
      transition: all 0.2s;
    }

    /* badge stock en la esquina de la carátula */
    .stock-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #0f0f1cbf;
      backdrop-filter: blur(4px);
      padding: 4px 8px;
      border-radius: 30px;
      font-size: 0.7rem;
      font-weight: 700;
      color: white;
      display: flex;
      align-items: center;
      gap: 4px;
      letter-spacing: -0.2px;
    }

    .stock-badge i {
      font-size: 0.65rem;
    }

    .low-stock {
      background: #b91c1cd9;
      color: #ffe4e4;
    }

    /* info de la tarjeta */
    .card-info {
      padding: 0.8rem 0.8rem 1rem 0.8rem;
    }

    .game-title {
      font-weight: 700;
      font-size: 0.95rem;
      line-height: 1.3;
      margin-bottom: 0.45rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      color: #f0f3fa;
    }

    .platform-detail {
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 8px 0 6px 0;
      font-size: 0.7rem;
      color: #b9c7da;
    }

    .platform-detail i {
      width: 18px;
      font-size: 0.8rem;
      color: #c084fc;
    }

    .price-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-top: 10px;
      border-top: 1px solid #253141;
      padding-top: 8px;
    }

    .game-price {
      font-weight: 800;
      font-size: 0.9rem;
      background: linear-gradient(135deg, #e2e8f0, #c7d2fe);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .stock-text {
      font-size: 0.7rem;
      font-weight: 500;
      background: #1f2a44;
      padding: 2px 8px;
      border-radius: 20px;
      color: #b9d0ff;
    }

    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3rem 1rem;
      background: #0f172a80;
      border-radius: 2rem;
      margin-top: 2rem;
    }

    .no-results i {
      font-size: 2.5rem;
      color: #64748b;
      margin-bottom: 0.8rem;
    }

    footer {
      text-align: center;
      margin-top: 2.5rem;
      font-size: 0.7rem;
      color: #5b6e8c;
      border-top: 1px solid #1e2933;
      padding-top: 1.5rem;
    }

    /* pequeños ajustes para tablets+ */
    @media (min-width: 500px) {
      .games-grid {
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 1.2rem;
      }
      .game-title {
        font-size: 1rem;
      }
    }

    @media (min-width: 768px) {
      body {
        padding: 1.5rem 2rem;
      }
      .games-grid {
        grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      }
    }

    @media (min-width: 1024px) {
      .games-grid {
        grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      }
    }
  </style>
</head>
<body>
<div class="inventory-wrapper">
  <div class="game-header">
    <h1>
      <i class="fas fa-cubes"></i> 
      GameVault
    </h1>
    <div class="sub"><i class="fas fa-phone-alt"></i> inventario móvil · stock en tiempo real</div>
  </div>

  <div class="search-section">
    <div class="search-box">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" placeholder="🔍 Buscar por nombre o plataforma... (ej: Zelda, PS5, Switch)" autocomplete="off">
    </div>
  </div>

  <div class="stats">
    <span><i class="fas fa-gamepad"></i> Catálogo</span>
    <span class="badge-count" id="resultsCount">0 juegos</span>
  </div>

  <div id="gamesGridContainer" class="games-grid">
    <!-- las tarjetas se inyectan dinámicamente con JS -->
  </div>

  <footer>
    <i class="fas fa-database"></i> inventario actualizado • desliza y explora tus juegos
  </footer>
</div>


<div id="resultado"></div>

<script>
let resultado=document.getElementById("resultado")  /
  const inventoryGames = [

    {

    },
    {
      id: 5,

      price: "$49.99",
      coverEmoji: "fa-hat-wizard",
    },
    {
      id: 6,
      name: "Cyberpunk 2077",
      platform: "PC / PS5 / Xbox",
      platformIcon: "fas fa-desktop",
      stock: 9,
      price: "$39.99",
      coverEmoji: "fa-microchip",
    },
    {
      id: 7,
      name: "EA Sports FC 24",
      platform: "PlayStation 5",
      platformIcon: "fab fa-playstation",
      stock: 10,
      price: "$59.99",
      coverEmoji: "fa-futbol",
    },
    {
      id: 8,
      name: "Minecraft",
      platform: "Multiplataforma",
      platformIcon: "fas fa-globe",
      stock: 15,
      price: "$29.99",
      coverEmoji: "fa-cube",
    },
    {
      id: 9,
      name: "Fortnite",
      platform: "Multi (PS, Xbox, PC, Mobile)",
      platformIcon: "fas fa-globe",
      stock: 999,
      price: "Gratis",
      coverEmoji: "fa-cloud-sun",
    },
    {
      id: 10,
      name: "Among Us",
      platform: "iOS / Android / PC",
      platformIcon: "fas fa-mobile-alt",
      stock: 99,
      price: "Gratis",
      coverEmoji: "fa-user-astronaut",
    },
    {
      id: 11,
      name: "Diablo IV",
      platform: "PC / PS5 / Xbox",
      platformIcon: "fas fa-skull",
      stock: 5,
      price: "$69.99",
      coverEmoji: "fa-fire",
    },
    {
      id: 12,
      name: "Final Fantasy VII Rebirth",
      platform: "PlayStation 5",
      platformIcon: "fab fa-playstation",
      stock: 3,
      price: "$69.99",
      coverEmoji: "fa-feather-alt",
    },
    {
      id: 13,
      name: "Stardew Valley",
      platform: "Nintendo Switch / PC",
      platformIcon: "fas fa-leaf",
      stock: 12,
      price: "$14.99",
      coverEmoji: "fa-seedling",
    },
    {
      id: 14,
      name: "Call of Duty: MWIII",
      platform: "Xbox / PS5 / PC",
      platformIcon: "fas fa-gun",
      stock: 8,
      price: "$69.99",
      coverEmoji: "fa-bullseye",
    }
  ];

class juego{
  constructor(precio, cantidad){
    this.precio = precio;    // CAMBIADO: coma por punto y coma
    this.cantidad = cantidad; // CAMBIADO: coma por punto y coma
  }
}
const galipon = new juego(40,1);

  // función para renderizar el grid (filtrado)
  function renderGames(filterText = "") {
    const container = document.getElementById("gamesGridContainer");
    if (!container) return;

    let filteredGames = [...inventoryGames];

    // filtro case-insensitive por nombre o plataforma
    if (filterText.trim() !== "") {
      const lowerFilter = filterText.toLowerCase();
      filteredGames = filteredGames.filter(game => 
        game.name.toLowerCase().includes(lowerFilter) || 
        game.platform.toLowerCase().includes(lowerFilter)
      );
    }

    // actualizar contador
    const resultsSpan = document.getElementById("resultsCount");
    if (resultsSpan) {
      resultsSpan.innerText = `${filteredGames.length} ${filteredGames.length === 1 ? "juego" : "juegos"}`;
    }

    // si no hay resultados
    if (filteredGames.length === 0) {
      container.innerHTML = `
        <div class="no-results">
          <i class="fas fa-exclamation-triangle"></i>
          <p style="margin-top: 8px;">⚠️ No se encontraron juegos<br>con ese nombre o plataforma</p>
          <small style="color:#5f7f9e;">Prueba con "Zelda", "PS5", "Switch" o "Minecraft"</small>
        </div>
      `;
      return;
    }

    // generar HTML de cada tarjeta
    let cardsHTML = "";
    for (const game of filteredGames) {
      // determinar clase especial para stock bajo (menor a 5 unidades, excepto gratis o stock masivo)
      const isLowStock = (game.stock < 5 && game.price !== "Gratis" && game.stock > 0) || (game.stock === 1);
      const stockLabel = game.price === "Gratis" ? "∞ digital" : `${game.stock} uds.`;
      
      // mostramos badge de stock con estilos
      const lowStockClass = isLowStock ? "low-stock" : "";
      
      // control para precio "Gratis" sin signo extra
      const displayPrice = game.price === "Gratis" ? "GRATIS" : game.price;
      
      // Manejo de ícono de portada (puede ser un fontawesome o un respaldo)
      let coverIconClass = game.coverEmoji ? game.coverEmoji : "fa-gamepad";
      // algunos íconos custom (por si acaso no existen, fallback)
      
      cardsHTML += `
        <div class="game-card">
          <div class="game-cover">
            <i class="fas ${coverIconClass} cover-icon"></i>
            <div class="stock-badge ${lowStockClass}">
              <i class="fas fa-boxes"></i> ${stockLabel}
            </div>
          </div>
          <div class="card-info">
            <div class="game-title">${escapeHtml(game.name)}</div>
            <div class="platform-detail">
              <i class="${game.platformIcon}"></i>
              <span>${escapeHtml(game.platform)}</span>
            </div>
            <div class="price-row">
              <span class="game-price">${displayPrice}</span>
              <span class="stock-text">
                <i class="fas ${isLowStock ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i> 
                ${game.stock > 0 ? (game.price === "Gratis" ? "Siempre disponible" : (isLowStock ? "Últimas unidades" : "En stock")) : "Agotado"}
              </span>
            </div>
          </div>
        </div>
      `;
    }
    container.innerHTML = cardsHTML;
  }

  // simple función para evitar XSS
  function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
      return c;
    });
  }

  // inicializar evento de búsqueda y primera carga
  document.addEventListener("DOMContentLoaded", () => {
    renderGames();
    
    const searchInput = document.getElementById("searchInput");
    if (searchInput) {
      searchInput.addEventListener("input", (e) => {
        renderGames(e.target.value);
      });
      // opcional: limpiar con tecla escape
      searchInput.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          searchInput.value = "";
          renderGames("");
        }
      });
    }
  });
  resultado.innerHTML = "hola"+"adios"+"q tal";
</script>
</body>
</html>
