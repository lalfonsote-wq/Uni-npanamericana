<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
 <style>
    body{
      background-color:skyblue;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }
   .background{
     background-image:url('Img/Foto1.jpg');
     background-size:cover;
     background-position:center;
     height:700px;
     width:320px;
     padding:0;
     border-radius: 20px;
     display:flex;
     flex-direction:column;
     overflow:hidden;
   }
  .white{
    background-color: white;
    border-radius:22px;
    height:500px;
    margin-top: auto;
    padding:15px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
  }
    ul{
      list-style: none;
      padding-left:0;
      word-spacing: 20px;
      font-size:12px;
    }
    li{
      display:inline;
    }
.stars {
  display:flex;
  justify-content:space-between;
  margin-top:10px;
  align-items:center;
  font-weight:bold;
}
.CI {
  display: flex;
  justify-content: space-between;
  margin-top:10px;
}

.CI img {
  max-width: 30px;
}

.size{
  max-width:80px;
}

.size2{
display: flex;  
justify-content:space-between;
font-size:12px;
margin-top:5px;
}

.FT{
  margin-top:15px;
}

.down{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:15px;
}

.down button{
  background:#2f80ed;
  color:white;
  border:none;
  padding:10px 18px;
  border-radius:12px;
}

 </style>
</head>

<body>
 <div class="background">
   <div class="white">
     <div>
       <ul>
        <li>About</li>
        <li>images</li>
        <li>raters</li>
        <li>reviews</li>
       </ul>
     </div>

     <div class="stars">
        maldives
       <img class="size" src="Img/Foto3.png" alt="estrela"  /> 5/5
     </div>

     <div></div>

     <div style="font-size:12px; opacity:0.7;">
     Maldivas is a holiday destination and the ultimate
     </div>

     <div class="CI">
       <img src="Img/Corriendo.png" alt="corre"/>
       <img src="Img/Caja.png" alt="caje"/> 
       <img src="Img/Autobus.png" alt="bus" />  
       <img src="Img/Meditando.png" alt="medi" />
     </div>

     <div class="size2">
      <div>corre</div>
      <div>caje</div>
      <div>bus</div>
      <div>medi</div>
     </div>

     <div class="FT">
       <div class="size2">
         <div>1 Bed room</div>
         <div>2 Person</div>
       </div>
       <div class="size2">
         <div>1 washroom</div>
         <div>Food</div>
       </div>
     </div>

     <div class="down">
       <div><b>Total:</b> $1200</div>
       <button>Buy Now</button>
     </div>
     
   </div>
 </div> 
</body>

</html>
