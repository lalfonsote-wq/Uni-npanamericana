<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Galería de Personajes</title>
</head>

<body>
  <style>
    img {
      height: 40px;
      width: 120px;
      border: 2px solid black;
    }
    #galeria {
      margin-top: 20px;
      padding: 10px;
      border: 1px solid #ccc;
    }
  </style>
  
  <button id="mostradorluigi" onclick="mostrarluigi()">
    mostrar luigi 
  </button>
  <button id="mostradormario" onclick="mostrarmario()">
    mostrar mario
  </button>
  <button id="mostradorwario" onclick="mostrarwario()">
    mostrar wario
  </button>
  <button id="mostradorwaluigi" onclick="mostrarwaluigi()">
    mostrar waluigi
  </button>
  
  <div id="galeria">
  </div>
  
  <script>
    let galeria = document.getElementById("galeria");
    
    class MoldePersonaje {
      constructor(nombre, imagen, vida) {
        this.nombre = nombre;
        this.imagen = imagen;
        this.vida = vida;
      }
    };
    
    // Función para guardar personajes en localStorage
    function guardarPersonajes(personajes) {
      localStorage.setItem('personajes', JSON.stringify(personajes));
    }
    
    // Función para cargar personajes desde localStorage
    function cargarPersonajes() {
      const personajesGuardados = localStorage.getItem('personajes');
      if (personajesGuardados) {
        const personajesData = JSON.parse(personajesGuardados);
        // Reconstruir los objetos como instancias de MoldePersonaje
        return personajesData.map(p => new MoldePersonaje(p.nombre, p.imagen, p.vida));
      }
      return null; // No hay datos guardados
    }
    
    // Verificar si hay personajes guardados, si no, crear los predeterminados
    let personajesGuardados = cargarPersonajes();
    
    let mario, luigi, wario, waluigi;
    
    if (personajesGuardados && personajesGuardados.length === 4) {
      // Usar personajes guardados
      [mario, luigi, wario, waluigi] = personajesGuardados;
      console.log("Personajes cargados desde localStorage");
    } else {
      // Crear personajes predeterminados
      mario = new MoldePersonaje("mario", "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT7nh_2VcwTHR_qUwO1aeY8s3bX600_YCadlRm3JB6AOg&s", 100);
      luigi = new MoldePersonaje("luigi", "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ_Cv5x0LhIG8KZVLepZnM1HiVQv2DCMWtBe4dy2jWbK4kbKYjpewhYYSL5jKt2SmvzI36j1UTyVWsJm4t2-SnGNWtXNr9b8xY7xtN3Frc&s=10", 70);
      wario = new MoldePersonaje("wario", "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR7gZTv6pmvmlK--nHL-7YzNg_ahGMubmbn2287HLiNJA&s=10", 120);
      waluigi = new MoldePersonaje("waluigi", "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTcapHbq8MTw3ybGgMb_bP3KGCxvvHkpjfzR3wmUvo3Yg&s=10", 110);
      
      // Guardar los personajes por primera vez
      guardarPersonajes([mario, luigi, wario, waluigi]);
      console.log("Personajes guardados en localStorage por primera vez");
    }
    
    function mostrarluigi() {
      galeria.innerHTML = `${luigi.nombre} - Vida: ${luigi.vida}
        <img src="${luigi.imagen}" alt="${luigi.nombre}">
      `;
    };
    
    function mostrarmario() {
      galeria.innerHTML = `${mario.nombre} - Vida: ${mario.vida}
        <img src="${mario.imagen}" alt="${mario.nombre}">
      `;
    };
    
    function mostrarwario() {
      galeria.innerHTML = `${wario.nombre} - Vida: ${wario.vida}
        <img src="${wario.imagen}" alt="${wario.nombre}">
      `;
    };
    
    function mostrarwaluigi() {
      galeria.innerHTML = `${waluigi.nombre} - Vida: ${waluigi.vida}
        <img src="${waluigi.imagen}" alt="${waluigi.nombre}">
      `;
    };
    
    // Función adicional para actualizar y guardar cambios
    function actualizarVidaPersonaje(nombre, nuevaVida) {
      let personaje;
      switch(nombre) {
        case 'mario':
          mario.vida = nuevaVida;
          personaje = mario;
          break;
        case 'luigi':
          luigi.vida = nuevaVida;
          personaje = luigi;
          break;
        case 'wario':
          wario.vida = nuevaVida;
          personaje = wario;
          break;
        case 'waluigi':
          waluigi.vida = nuevaVida;
          personaje = waluigi;
          break;
      }
      // Guardar todos los personajes actualizados
      guardarPersonajes([mario, luigi, wario, waluigi]);
      console.log(`${nombre} actualizado a vida ${nuevaVida} y guardado`);
    }
    
    // Ejemplo de uso - puedes llamar a esta función desde la consola
    // actualizarVidaPersonaje('mario', 150);
    
  </script>
</body>

</html>
