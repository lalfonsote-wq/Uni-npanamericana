<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jujutsu Cards</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle, #1c1c2e, #05050a);
      color: white;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #ff315a;
      text-shadow: 0 0 12px #ff315a;
    }

    .arena {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 18px;
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: linear-gradient(180deg, #1f1f35, #101018);
      border: 2px solid #ff315a;
      border-radius: 18px;
      padding: 14px;
      text-align: center;
      box-shadow: 0 0 18px rgba(255, 49, 90, 0.35);
    }

    .card img {
      width: 100%;
      height: 190px;
      object-fit: cover;
      border-radius: 14px;
      border: 2px solid #333;
    }

    .card h2 {
      font-size: 18px;
      margin: 12px 0 8px;
    }

    .vida-texto {
      font-size: 14px;
      margin-bottom: 6px;
    }

    .barra-vida {
      width: 100%;
      height: 14px;
      background: #333;
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .vida {
      height: 100%;
      background: linear-gradient(90deg, #00ff88, #b6ff00);
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 12px;
      background: #ff315a;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:active {
      transform: scale(0.96);
    }
  </style>
</head>

<body>

  <h1>Jujutsu Arena</h1>
<div id="resultado"></div>
  <div class="arena" id="resultado">

    
      



    

    

    

    
    </div>

  </div>
<script>
  let resultado=document.getElementById("resultado")
  let view=document.getElementById ("view")
  async function kalsen(){
    let llamada= await fetch("Practicakaisen.json")
    let view= await llamada.json()
    console.log(view[0].nombre)
    
    

view.forEach((personaje)=>{
  resultado.innerHTML+=`<div class="card">
      <img src="${personaje.foto} " alt="Yuji Itadori">
      <h2>${personaje.nombre}</h2>
      <p class="vida-texto">vida:${personaje.velocidad} </p>
      <div class="barra-vida">
        <div class="vida" style="width: ${personaje.velocidad}%;"></div>
      </div>
      <button>Atacar</button>`
}) 

  }
  kalsen()
  
</script>
</body>
</html>
