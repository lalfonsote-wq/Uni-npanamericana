<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
  <style>
   .photo{
     background-image:url("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT7nh_2VcwTHR_qUwO1aeY8s3bX600_YCadlRm3JB6AOg&s=10");
     
     height:300px;
     width:300px;
     background-size:cover;
   }
  </style>
</head>

<body>
 <select id="selector">
  <option value="mario">
    Mario 
    
  </option>
  <option value="luigi">
    luigi
  </option>
  <option value="wario">
    wario
  </option>
   <option value="waluigi">
    waluigi
  </option>
 </select>
  <div id="personajes">
    <div class="personajecard">
      <div class="nombre" id="nombredelpersonaje"></div>
      <div class="photo" id="photod" style="url() "></div>
      <div class="vida" id="vidad"></div>
      
    </div>
  </div>
  <script>
  let nombredelpersonaje=document.getElementById("nombredelpersonaje");
  let photod=document.getElementById("photod");
  let vidad=document.getElementById ("vidad");
  let selector=document.getElementById("selector");
    class MoldePersonaje{
      constructor(nombre, imagen,vida){
        this.nombre=nombre;
        this.imagen=imagen;
        this.vida=vida;
      }
    };
    const mario= new MoldePersonaje("mario", "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT7nh_2VcwTHR_qUwO1aeY8s3bX600_YCadlRm3JB6AOg&s", 100);
    const luigi= new MoldePersonaje("luigi","https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ_Cv5x0LhIG8KZVLepZnM1HiVQv2DCMWtBe4dy2jWbK4kbKYjpewhYYSL5jKt2SmvzI36j1UTyVWsJm4t2-SnGNWtXNr9b8xY7xtN3Frc&s=10",70 )
    const wario= new MoldePersonaje("wario","https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR7gZTv6pmvmlK--nHL-7YzNg_ahGMubmbn2287HLiNJA&s=10",120 )
    const waluigi= new MoldePersonaje("waluigi","https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTcapHbq8MTw3ybGgMb_bP3KGCxvvHkpjfzR3wmUvo3Yg&s=10",110 )
    
    function mostrarPersonaje(){
      if (selector.value== "mario") {
  nombredelpersonaje.innerHTML = mario.nombre;
  
  photod.style.backgroundImage = "url(" + mario.imagen + ")"
  vidad.innerHTML = ` este personaje tiene ${mario.vida} de vid`;
  
}
if (selector.value == "luigi"){
  nombredelpersonaje.innerHTML = luigi.nombre;
  
  photod.style.backgroundImage = "url(" + luigi.imagen + ")"
  vidad.innerHTML = ` este personaje tiene ${luigi.vida} de vid`;
}
if (selector.value == "wario"){
  nombredelpersonaje.innerHTML = wario.nombre;
  
  photod.style.backgroundImage = "url(" + wario.imagen + ")"
  vidad.innerHTML = ` este personaje tiene ${wario.vida} de vid`;
}
if (selector.value == "waluigi"){
  nombredelpersonaje.innerHTML = waluigi.nombre;
  
  photod.style.backgroundImage = "url(" + waluigi.imagen + ")"
  vidad.innerHTML = ` este personaje tiene ${waluigi.vida} de vid`;
}
    }
    selector.addEventListener(
     "change", mostrarPersonaje
    );
    mostrarPersonaje();
  </script>
</body>
